<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courage Browser</title>
</head>
<style>
    * { margin: 0; padding: 0; }
    body { display: flex; flex-direction: column; }

    #toolbar{
        background-color: #1b1b1f;
        padding: 6px;
         display: flex;
         align-items: center;
          gap: 6px;
    }

    #addressbar{
        flex : 1;
        padding: 6px 12px ;
        border-radius: 20px;
        border: none;
        background: #3b3b3f;
        color: white;
        outline: none;
    }
  button{
    background: transparent;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 16px;
    padding: 4px 8px;
    border-radius: 6px;
  }

  button:hover {
    background: #3b3b3f;
}

</style>
<body>
  <div id =toolbar>
     <button id="backword">&#8592;</button>
    <button id="farword">&#8594;</button>
     <button id="reload">&#8635;</button>
     <input placeholder="Address Bar" id="addressbar">
     <button id="go">GO</button>
    

  </div>

    <canvas id="window">
       


    </canvas>
   <script src="renderer.js"> </script> 
</body>
</html>
