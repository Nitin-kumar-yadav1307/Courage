<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courage Browser</title>
</head>
<style>
    * { margin: 0; padding: 0; }
    body { display: flex; flex-direction: column; }

    #toolbar{
        background-color: #1b1b1f;
        padding: 6px;
         display: flex;
         align-items: center;
          gap: 6px;
    }

    #addressbar{
        flex : 1;
        padding: 6px 12px ;
        border-radius: 20px;
        border: none;
        background: #3b3b3f;
        color: white;
        outline: none;
    }
  button{
    background: transparent;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 16px;
    padding: 4px 8px;
    border-radius: 6px;
  }

  button:hover {
    background: #3b3b3f;
}

#tabBar {
    background: #111113;
    display: flex;
    align-items: center;
    padding: 4px 4px 0 4px;
    gap: 4px;
}
.tab {
    background: #2b2b2f;
    color: white;
    padding: 6px 12px;
    border-radius: 6px 6px 0 0;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 100px;
    max-width: 200px;
}
.tab.active {
    background: #1b1b1f;
}

.tab .close {
    font-size: 11px;
    opacity: 0.6;
}

.tab .close:hover {
    opacity: 1;
}

#newTab {
    font-size: 18px;
    padding: 4px 10px;
}

</style>
<body>

  
    <div id="tabBar">
    <button id="addTab">+</button>
</div>
  
  <div id =toolbar>
     <button id="backword">&#8592;</button>
    <button id="farword">&#8594;</button>
     <button id="reload">&#8635;</button>
     <input placeholder="Address Bar" id="addressbar">
     <button id="go">GO</button>
    

  </div>

    <canvas id="window">
       


    </canvas>
   <script src="renderer.js"> </script> 
</body>
</html>
